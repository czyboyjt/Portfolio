
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Jonte Taffe Product Portfolio</title>
    <link rel="icon" type="image/png" href="/images/Czyboylogo2.png" />
    <meta
      name="description"
      content="Portfolio of Jonte Taffe — product builder focused on product management, UX design, AI-powered development, and human-centered technology."
    />
    
    <meta property="og:title" content="Jonte Taffe | Product Builder" />
    
    <meta
      property="og:description"
      content="Product builder creating thoughtful digital experiences through product, UX, and AI."
    />

<meta property="og:image" content="/images/preview.png" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #080808;
        color: #fff;
        margin: 0;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      h1, h2, h3, .font-display {
        font-family: 'Satoshi', sans-serif;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      html, body, .custom-cursor-area, .custom-cursor-area * {
        cursor: none !important;
      }

      .glass {
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(32px);
        -webkit-backdrop-filter: blur(32px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 
          0 4px 24px -1px rgba(0, 0, 0, 0.3),
          0 0 1px 0 rgba(255, 255, 255, 0.15) inset;
      }

      .glass-panel {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
        backdrop-filter: blur(48px);
        -webkit-backdrop-filter: blur(48px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 
          0 20px 50px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(255, 255, 255, 0.08) inset;
      }

      .glass-hover:hover {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
      }
      
      .reveal {
        opacity: 0;
        transform: translateY(40px);
        transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        will-change: opacity, transform;
      }
      
      .reveal-left {
        opacity: 0;
        transform: translateX(-40px);
        transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        will-change: opacity, transform;
      }

      .reveal-right {
        opacity: 0;
        transform: translateX(40px);
        transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        will-change: opacity, transform;
      }

      .reveal-scale {
        opacity: 0;
        transform: scale(0.95) translateY(20px);
        transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        will-change: opacity, transform;
      }
      
      .reveal-visible {
        opacity: 1 !important;
        transform: translate(0, 0) scale(1) !important;
      }

      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #080808;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #444;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .animate-marquee {
        animation: marquee 30s linear infinite;
        display: flex;
        width: max-content;
      }

      @keyframes music-bar {
        0%, 100% { height: 4px; }
        50% { height: 12px; }
      }

      .reveal-visible .w-2.h-2.rounded-full.bg-white\/20 {
        background-color: #f97316 !important;
        box-shadow: 0 0 15px rgba(249, 115, 22, 0.8);
        transform: scale(1.5);
      }

      @keyframes scan {
        0% { transform: translateY(0); }
        50% { transform: translateY(100%); }
        100% { transform: translateY(0); }
      }

      @keyframes drift {
        from { transform: translate(0, 0); }
        to { transform: translate(40px, 40px); }
      }
      .animate-drift { animation: drift 15s infinite alternate ease-in-out; }
      .animate-drift-slow { animation: drift 20s infinite alternate-reverse ease-in-out; }

      .orange-glow {
        filter: blur(120px);
        mix-blend-mode: plus-lighter;
      }

      @keyframes status-color-bg {
        0%, 43.75% { background-color: #f97316; box-shadow: 0 0 12px rgba(249, 115, 22, 0.8); }
        50%, 93.75% { background-color: #3b82f6; box-shadow: 0 0 12px rgba(59, 130, 246, 0.8); }
        100% { background-color: #f97316; box-shadow: 0 0 12px rgba(249, 115, 22, 0.8); }
      }

      @keyframes status-color-ping {
        0%, 43.75% { background-color: #f97316; }
        50%, 93.75% { background-color: #3b82f6; }
        100% { background-color: #f97316; }
      }

      @keyframes status-breathing {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }

      .animate-status-dot {
        animation: status-breathing 1.2s infinite ease-in-out, status-color-bg 8s infinite ease-in-out;
      }

      .animate-status-ping {
        animation: ping 1.2s cubic-bezier(0, 0, 0.2, 1) infinite, status-color-ping 8s infinite ease-in-out;
      }
    </style>

{

}
</script>

</body>
</html>
